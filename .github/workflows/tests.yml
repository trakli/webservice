name: Tests

on:
  pull_request:
    branches:
      - main
      - dev
      - delete-mev

permissions:
  contents: write
  pull-requests: write

jobs:
  docker-build-dev:
    name: Verify Dev Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build dev Dockerfile
        run: docker build --build-arg HOST_UID=1000 --build-arg HOST_GID=1000 -t trakli-dev-test .

  docker-build-prod:
    name: Verify Prod Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build prod Dockerfile
        run: docker build -f docker/prod/Dockerfile -t trakli-prod-test .

  tests:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: trakli
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
          extensions: pcov
          coverage: pcov

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-suggest --no-interaction
      - name: Copy .env file
        run: cp .env.example .env
      - name: Update .env file
        run: |
            sed -i 's/APP_ENV=local/APP_ENV=testing/' .env
            sed -i 's/DB_HOST=mysql/DB_HOST=127.0.0.1/' .env
            sed -i 's/DB_PORT=3306/DB_PORT=3306/' .env
            sed -i 's/DB_DATABASE=trakli/DB_DATABASE=trakli/' .env
            sed -i 's/QUEUE_CONNECTION=sync/QUEUE_CONNECTION=database/' .env
            sed -i 's/DB_USERNAME=trakli/DB_USERNAME=root/' .env

      - name: Generate application key
        run: php artisan key:generate
      - name: Configure database
        run: |
          php artisan config:clear
          php artisan config:cache

      - name: Run migrations
        run: php artisan migrate --seed
      - name: Run tests
        run: php artisan test --coverage-clover=reports/coverage/coverage.xml --coverage-text
      - name: Get coverage
        id: coverage
        run: |
            COVERAGE=$(php .github/scripts/get_coverage.php)
            echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT

      - name: Check coverage
        run: php .github/scripts/check_coverage.php ${{ steps.coverage.outputs.coverage }}

            # Optional: post comment only if PR is not from a fork
      - name: Compute comment values
        id: comment-values
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: |
          PR_COVERAGE=${{ steps.coverage.outputs.coverage }}
          BASELINE=$(php -r "echo json_decode(file_get_contents('.github/coverage-baseline.json'), true)['coverage'] ?? 0;")
          CHANGE=$(php -r "echo ($PR_COVERAGE-$BASELINE>=0?'+':'').round($PR_COVERAGE-$BASELINE,1).'%';")
          echo "baseline=$BASELINE" >> $GITHUB_OUTPUT
          echo "change=$CHANGE" >> $GITHUB_OUTPUT

      - name: Find Coverage Comment
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: peter-evans/find-comment@v3
        id: fc
        with:
            issue-number: ${{ github.event.pull_request.number }}
            comment-author: 'github-actions[bot]'
            body-includes: Coverage Report

      - name: Post Coverage Comment
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            **Coverage Report**
            PR coverage: ${{ steps.coverage.outputs.coverage }}%
            Baseline: ${{ steps.comment-values.outputs.baseline }}%
            Change: ${{ steps.comment-values.outputs.change }}
