name: Deploy to Staging

on:
  workflow_run:
    workflows: ["Build and Publish Docker Image"]
    types:
      - completed
    branches:
      - dev

jobs:
  deploy-staging:
    # Only after a push-triggered build succeeds. Releases publish `latest`
    # for production and do not deploy to staging.
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    env:
      FLATRUN_URL: ${{ vars.FLATRUN_URL }}
      FLATRUN_TOKEN: ${{ secrets.FLATRUN_TOKEN }}

    steps:
      - name: Setup FlatRun
        uses: flatrun/actions/setup-flatrun@v1
        with:
          version: 0.2.0

      - name: Deploy
        run: flatrun deployment image set trakli-staging app ghcr.io/trakli/webservice:${{ github.event.workflow_run.head_sha }} --deploy

      - name: Run database migrations
        run: flatrun deployment exec trakli-staging app -- php artisan migrate

      - name: Optimize application caches
        run: flatrun deployment exec trakli-staging app -- php artisan optimize
