name: Build and Publish Docker Image

on:
  push:
    branches:
      - dev
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push commit image
        if: ${{ github.event_name == 'push' }}
        uses: docker/build-push-action@v4
        with:
          context: .
          file: docker/prod/Dockerfile
          push: true
          tags: ghcr.io/trakli/webservice:${{ github.sha }}

      - name: Build and push latest
        if: ${{ github.event_name == 'release' }}
        uses: docker/build-push-action@v4
        with:
          context: .
          file: docker/prod/Dockerfile
          push: true
          tags: |
            ghcr.io/trakli/webservice:latest
            ghcr.io/trakli/webservice:${{ github.event.release.tag_name }}

  deploy-staging:
    needs: build
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    env:
      FLATRUN_URL: ${{ vars.FLATRUN_URL }}
      FLATRUN_TOKEN: ${{ secrets.FLATRUN_TOKEN }}

    steps:
      - name: Setup FlatRun
        uses: flatrun/actions/setup-flatrun@v1
        with:
          version: 0.2.0

      - name: Deploy
        run: flatrun deployment image set trakli-staging app ghcr.io/trakli/webservice:${{ github.sha }} --deploy

      - name: Run database migrations
        run: flatrun deployment exec trakli-staging app -- php artisan migrate

      - name: Optimize application caches
        run: flatrun deployment exec trakli-staging app -- php artisan optimize
